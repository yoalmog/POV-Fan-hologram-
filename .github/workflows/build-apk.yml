name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Force Install Linux-x64 Tailwind Native Binary
        run: |
          npm install @tailwindcss/oxide-linux-x64-gnu@4.1.14 --no-save

      - name: Build Web App (Vite)
        run: npm run build

      - name: Sync Capacitor Web Assets to Android
        run: npx cap sync android

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Regenerate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.14.3 --distribution-type all

      - name: Make Gradle Daemon Executable
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoloSpin-POV-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
